<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="CamCon — Cinema Camera Controller">
  <defs>
    <radialGradient id="glow" cx="80%" cy="12%" r="75%">
      <stop offset="0%" stop-color="#E8A33D" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#0B0B0D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8A33D"/>
      <stop offset="100%" stop-color="#B87A1E"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#0B0B0D"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- corner brackets -->
  <g fill="none" stroke="#E8A33D" stroke-width="4" opacity="0.7">
    <path d="M64 108V72a8 8 0 0 1 8-8h36"/>
    <path d="M1136 108V72a8 8 0 0 0-8-8h-36"/>
    <path d="M64 522v36a8 8 0 0 0 8 8h36"/>
    <path d="M1136 522v36a8 8 0 0 1-8 8h-36"/>
  </g>

  <!-- aperture -->
  <g transform="translate(980 315)" opacity="0.9">
    <circle r="150" fill="none" stroke="#26262B" stroke-width="2"/>
    <circle r="112" fill="none" stroke="#26262B" stroke-width="2"/>
    <g fill="none" stroke="url(#amber)" stroke-width="3">
      <path d="M0 -145 L86 -44"/><path d="M138 72 L26 72"/>
      <path d="M52 138 L0 26"/><path d="M-138 72 L-26 -44"/>
      <path d="M-86 -138 L0 -26"/><path d="M138 -44 L26 26"/>
    </g>
    <circle r="12" fill="#E8A33D"/>
  </g>

  <!-- text -->
  <text x="96" y="250" fill="#E8A33D" font-family="monospace" font-size="26" letter-spacing="8">CINEMA CAMERA CONTROLLER</text>
  <text x="94" y="345" fill="#F2F2F0" font-family="Pretendard, sans-serif" font-size="76" font-weight="700">CamCon</text>
  <text x="96" y="420" fill="#F2F2F0" font-family="Pretendard, sans-serif" font-size="38" font-weight="600">셔터를 누르면, 필름룩 사진이</text>
  <text x="96" y="472" fill="#F2F2F0" font-family="Pretendard, sans-serif" font-size="38" font-weight="600">폰에 도착합니다</text>
  <text x="96" y="540" fill="#9A9AA0" font-family="Pretendard, sans-serif" font-size="24">PTP/IP · USB OTG · 필름 시뮬레이션 296종</text>
</svg>
