// 16KB м •л ¬ нғңмҠӨнҒ¬ (libyuv-decoder.soмҡ©)
tasks.register('align16KbLibraries') {
    description = 'libyuv-decoder.soлҘј 16KBлЎң м •л ¬'

    doLast {
        def abiDirs = ['arm64-v8a', 'armeabi-v7a', 'x86', 'x86_64']
        def libName = 'libyuv-decoder.so'
        def aligned = false

        // merged_native_libsм—җм„ң мІҳлҰ¬
        def baseDir = file("${buildDir}/intermediates/merged_native_libs")

        abiDirs.each { abi ->
            def libFile = fileTree(baseDir).matching {
                include "**/${abi}/${libName}"
            }.singleFile

            if (libFile?.exists()) {
                println "рҹ”§ 16KB м •л ¬ мІҳлҰ¬ мӨ‘: ${libFile.path}"

                try {
                    // objcopyлЎң 16KB м •л ¬
                    def ndkDir = android.ndkDirectory
                    def objcopy = "${ndkDir}/toolchains/llvm/prebuilt/darwin-x86_64/bin/llvm-objcopy"

                    if (!file(objcopy).exists()) {
                        // лҢҖмІҙ кІҪлЎң мӢңлҸ„ (Linux)
                        objcopy = "${ndkDir}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-objcopy"
                    }

                    if (file(objcopy).exists()) {
                        def tempFile = new File(libFile.parent, "${libName}.tmp")

                        exec {
                            commandLine objcopy,
                                    '--set-section-alignment', '.text=16384',
                                    '--set-section-alignment', '.data=16384',
                                    '--set-section-alignment', '.rodata=16384',
                                    '--set-section-alignment', '.bss=16384',
                                    libFile.path,
                                    tempFile.path
                        }

                        // мӣҗліёмқ„ л°ұм—…н•ҳкі  м •л ¬лҗң нҢҢмқјлЎң көҗмІҙ
                        libFile.delete()
                        tempFile.renameTo(libFile)

                        println "вң… 16KB м •л ¬ мҷ„лЈҢ: ${abi}/${libName}"
                        aligned = true
                    } else {
                        println "вҡ пёҸ llvm-objcopyлҘј м°ҫмқ„ мҲҳ м—ҶмқҢ. м •л ¬ кұҙл„ҲлңҖ."
                    }
                } catch (Exception e) {
                    println "вҡ пёҸ 16KB м •л ¬ мӢӨнҢЁ (л¬ҙмӢң к°ҖлҠҘ): ${e.message}"
                }
            }
        }

        if (!aligned) {
            println "в„№пёҸ libyuv-decoder.soлҘј м°ҫмқ„ мҲҳ м—Ҷкұ°лӮҳ м •л ¬н•ҳм§Җ м•ҠмқҢ"
            println "   вҶ’ 16KB кІҪкі лҠ” 2025л…„ 11мӣ”к№Ңм§Җ Play Storeм—җм„ң н—Ҳмҡ©лҗЁ"
        }
    }
}

