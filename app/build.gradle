// === к°ңм„ лҗң лІ„м „ кҙҖлҰ¬ мӢңмҠӨн…ң ===

// л©”мқҙм Җ.л§Ҳмқҙл„Ҳ.нҢЁм№ҳ лІ„м „ м •мқҳ (мҲҳлҸҷ кҙҖлҰ¬)
project.ext.majorVersion = 1
project.ext.minorVersion = 2
project.ext.patchVersion = 1

// лёҢлһңм№ҳлі„ лІ„м „ мӢқлі„мһҗ мғқм„ұ
def getBranchVersionSuffix() {
    try {
        def branchName = 'git rev-parse --abbrev-ref HEAD'.execute().text.trim()
        def shortHash = 'git rev-parse --short HEAD'.execute().text.trim()

        switch (branchName) {
            case 'main':
            case 'master':
                return "" // л©”мқё лёҢлһңм№ҳлҠ” мҲңмҲҳ лІ„м „
            case { it.startsWith('release/') }:
                return "-rc" // лҰҙлҰ¬мҰҲ нӣ„ліҙ
            case { it.startsWith('hotfix/') }:
                return "-hotfix.${shortHash}"
            case 'develop':
                return "-dev.${shortHash}"
            case { it.startsWith('feature/') }:
                return "-feature.${shortHash}"
            default:
                return "-${branchName.replaceAll('[^a-zA-Z0-9]', '')}.${shortHash}"
        }
    } catch (Exception ignored) {
        return "-unknown"
    }
}

// л№Ңл“ң лІҲнҳё мғқм„ұ (нғҖмһ„мҠӨнғ¬н”„ кё°л°ҳмңјлЎң лӢЁмЎ°мҰқк°Җ ліҙмһҘ)
def getBuildNumber() {
    def buildNumber = System.getProperty("BUILD_NUMBER")
    if (buildNumber) {
        return buildNumber.toInteger()
    }

    try {
        // Git м»Өл°Ӣ м№ҙмҡҙнҠё мӮ¬мҡ© (м•Ҳм •м Ғ)
        def commitCount = 'git rev-list --count HEAD'.execute().text.trim()
        return commitCount.toInteger()
    } catch (Exception ignored) {
        // нҸҙл°ұ: нҳ„мһ¬ мӢңк°„ кё°л°ҳ (л¶„ лӢЁмң„)
        return (System.currentTimeMillis() / 60000).intValue()
    }
}

// мөңмў… лІ„м „ л¬ёмһҗм—ҙ мғқм„ұ
def getAppVersionName() {
    def baseVersion = "${project.ext.majorVersion}.${project.ext.minorVersion}.${project.ext.patchVersion}"
    def suffix = getBranchVersionSuffix()
    return baseVersion + suffix
}

// лІ„м „ мҪ”л“ң мғқм„ұ (Play Storeмҡ© - лӢЁмЎ°мҰқк°Җ ліҙмһҘ)
def getAppVersionCode() {
    // л©”мқҙм Җ(2мһҗлҰ¬) + л§Ҳмқҙл„Ҳ(2мһҗлҰ¬) + нҢЁм№ҳ(2мһҗлҰ¬) + л№Ңл“ңлІҲнҳё мЎ°н•©
    def baseVersionCode = project.ext.majorVersion * 1000000 + project.ext.minorVersion * 10000 + project.ext.patchVersion * 100
    def buildNumber = getBuildNumber()
    return baseVersionCode + (buildNumber % 100) // л№Ңл“ңлІҲнҳёлҠ” 99к№Ңм§Җл§Ң мӮ¬мҡ©
}

android {
    namespace 'com.inik.camcon'
    compileSdk 36

    // нӮӨмҠӨнҶ м–ҙ м„Өм • лЎңл“ң
    def keystorePropertiesFile = rootProject.file("key.properties")
    def keystoreProperties = new Properties()
    if (keystorePropertiesFile.exists()) {
        keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
    }

    signingConfigs {
        // debug нӮӨлҠ” Android Gradle Plugin кё°ліё л””лІ„к·ё нӮӨ мӮ¬мҡ©
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            }
        }
    }

    defaultConfig {
        applicationId "com.inik.camcon"
        minSdk 29
        targetSdk 36
        versionCode getAppVersionCode()
        versionName getAppVersionName()
        ndk {
            abiFilters "arm64-v8a"  // 16KB нҺҳмқҙм§Җ нҒ¬кё° м§Җмӣҗ (Android 15+)
        }
        testInstrumentationRunner "com.inik.camcon.HiltTestRunner"

        // м§Җмӣҗн•ҳлҠ” м–ём–ҙ м„Өм •
        resConfigs "en", "ko", "it", "fr", "de", "ja"
    }

    buildTypes {
        debug {
            debuggable true
            minifyEnabled false
            shrinkResources false
//            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
            buildConfigField "boolean", "SHOW_DEVELOPER_FEATURES", "true"
            signingConfig signingConfigs.debug
        }

        release {
            debuggable false
            minifyEnabled true
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
            buildConfigField "boolean", "SHOW_DEVELOPER_FEATURES", "false"
        }

//        // лҰҙлҰ¬мҰҲ мөңм Ғнҷ” + л””лІ„к№… к°ҖлҠҘ
//        releaseDebug {
//            initWith release
//            debuggable true
//            minifyEnabled false
//            shrinkResources false
//            applicationIdSuffix ".release.debug"
//            versionNameSuffix "-release-debug"
//            matchingFallbacks = ['release', 'debug']
//            buildConfigField "boolean", "SHOW_DEVELOPER_FEATURES", "true"
//        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    externalNativeBuild {
        cmake {
            path file('src/main/cpp/CMakeLists.txt')
            version '3.22.1'
        }
    }

    // CMake л№Ңл“ң нғҖмһ… мҠӨмң„м№ҳ
    android.buildTypes.all { buildType ->
        externalNativeBuild.cmake {
            // 16KB нҺҳмқҙм§Җ нҒ¬кё° м§Җмӣҗ (Android 15+ н•„мҲҳ)
            def link16KbFlags = '-Wl,-z,max-page-size=16384'

            if (buildType.name == 'debug') {
                arguments '-DCMAKE_BUILD_TYPE=Debug',
                        "-DCMAKE_SHARED_LINKER_FLAGS=${link16KbFlags}",
                        "-DCMAKE_EXE_LINKER_FLAGS=${link16KbFlags}"
            } else if (buildType.name == 'releaseDebug') {
                arguments '-DCMAKE_BUILD_TYPE=RelWithDebInfo',
                        "-DCMAKE_SHARED_LINKER_FLAGS=${link16KbFlags}",
                        "-DCMAKE_EXE_LINKER_FLAGS=${link16KbFlags}"
            } else {
                arguments '-DCMAKE_BUILD_TYPE=Release',
                        '-DCMAKE_CXX_FLAGS_RELEASE=-O3 -flto -ffast-math -funroll-loops',
                        '-DCMAKE_C_FLAGS_RELEASE=-O3 -flto -ffast-math',
                        "-DCMAKE_SHARED_LINKER_FLAGS=-s -Wl,--gc-sections -Wl,--strip-all ${link16KbFlags}",
                        "-DCMAKE_EXE_LINKER_FLAGS=${link16KbFlags}"
            }
            cFlags '-g'
            cppFlags '-g'
        }
    }

    sourceSets {
        main { jniLibs.srcDirs = ['src/main/jniLibs'] }
    }
    buildFeatures {
        viewBinding true
        compose true
        buildConfig true
    }

    kotlinOptions {
        jvmTarget = "11"
        freeCompilerArgs += [
                "-opt-in=androidx.compose.material.ExperimentalMaterialApi",
                "-opt-in=androidx.compose.material3.ExperimentalMaterial3Api",
                "-opt-in=androidx.compose.foundation.ExperimentalFoundationApi"
        ]
    }

    packaging {
        jniLibs {
            useLegacyPackaging = false  // 16KB м •л ¬мқ„ мң„н•ҙ falseлЎң ліҖкІҪ
            keepDebugSymbols += ['**/*.so']
            // 16KB нҺҳмқҙм§Җ нҒ¬кё° м •л ¬ нҷңм„ұнҷ” (Android 15+ н•„мҲҳ)
            pickFirsts += ['**/*.so']
        }
        resources {
            excludes += [
                    'META-INF/DEPENDENCIES',
                    'META-INF/LICENSE',
                    'META-INF/LICENSE.txt',
                    'META-INF/NOTICE',
                    'META-INF/NOTICE.txt',
                    'META-INF/*.kotlin_module'
            ]
        }
    }

}

